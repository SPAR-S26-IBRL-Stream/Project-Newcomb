name: Tests

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  smoke-and-unit:
    name: Smoke & Unit Tests (Round 1+2)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv sync --extra test
      - run: uv run pytest tests/test_smoke.py tests/test_agents.py tests/test_agents_extended.py tests/test_environments.py tests/test_environments_extended.py tests/test_simulator.py tests/test_construction.py -v

  correctness:
    name: Correctness Tests (Round 3)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv sync --extra test
      - run: uv run pytest tests/test_correctness_properties.py tests/test_correctness_convergence.py tests/test_correctness_adversarial.py -v

  coverage:
    name: Coverage Report
    runs-on: ubuntu-latest
    needs: smoke-and-unit
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv sync --extra test
      - run: uv run pytest tests/ --cov=ibrl --cov-report=term-missing --cov-fail-under=80
      - name: Coverage check failed
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `⚠️ **Coverage Check Failed**\n\nCode coverage has dropped below 80% threshold.\n\n**Why this matters:**\n- Ensures core library remains well-tested\n- Prevents silent bugs from entering main branch\n- Maintains code quality standards\n\n**How to fix:**\n1. Check the coverage report: Go to "Checks" → "Coverage Report" → view logs\n2. Add tests for uncovered lines in the core library (ibrl/)\n3. Experimental code (experimental1-3) is intentionally excluded\n4. Push your changes and this check will re-run\n\n**Coverage threshold:** 80% minimum on core library`
            });
