name: Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  smoke-and-unit:
    name: Smoke & Unit Tests (Round 1+2)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv sync --extra test
      - run: uv run pytest tests/test_smoke.py tests/test_agents.py tests/test_agents_extended.py tests/test_environments.py tests/test_environments_extended.py tests/test_simulator.py tests/test_construction.py -v

  correctness:
    name: Correctness Tests (Round 3)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv sync --extra test
      - run: uv run pytest tests/test_correctness_properties.py tests/test_correctness_convergence.py tests/test_correctness_adversarial.py -v

  coverage:
    name: Coverage Report
    runs-on: ubuntu-latest
    needs: smoke-and-unit
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv sync --extra test
      - run: uv run pytest tests/ --cov=ibrl --cov-report=term-missing > coverage.txt 2>&1
      - name: Comment coverage on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const coverage = fs.readFileSync('coverage.txt', 'utf8');
            const lines = coverage.split('\n');
            const totalLine = lines.find(l => l.includes('TOTAL'));
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Test Results\n\n✅ All tests passed\n\n\`\`\`\n${totalLine}\n\`\`\``
            });
