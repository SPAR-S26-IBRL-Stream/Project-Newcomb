name: Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  smoke-tests:
    name: Smoke Tests (Round 1)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v2
      - run: uv sync --extra test
      - run: uv run pytest tests/test_smoke.py tests/test_supra_pomdp_smoke.py -v

  unit-tests:
    name: Unit Tests (Round 2)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v2
      - run: uv sync --extra test
      - run: uv run pytest tests/ -v --cov=ibrl --cov-report=term-missing --cov-fail-under=75

  supra-pomdp-tests:
    name: SupraPOMDP Tests (Round 3)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v2
      - run: uv sync --extra test
      - run: uv run pytest tests/test_supra_pomdp_world_model.py tests/test_supra_pomdp_integration.py tests/test_supra_pomdp_agent.py -v --timeout=30
