name: Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, '**']  # Run on all branches

jobs:
  smoke-tests:
    name: Smoke Tests (Round 1)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v2
      - run: uv sync --extra test
      - run: uv run pytest tests/test_smoke.py -v

  agent-environment-tests:
    name: Agent & Environment Tests (Round 2)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v2
      - run: uv sync --extra test
      - run: uv run pytest tests/test_agents.py tests/test_environments.py tests/test_construction.py tests/test_simulator.py tests/test_ib_world_model.py -v --cov=ibrl --cov-report=term-missing --cov-fail-under=75

  supra-pomdp-tests:
    name: SupraPOMDP Tests (Round 3)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v2
      - run: uv sync --extra test
      - run: uv run pytest tests/test_supra_pomdp_smoke.py tests/test_supra_pomdp_world_model.py tests/test_supra_pomdp_integration.py tests/test_supra_pomdp_agent.py tests/test_belief_dependent_agent.py tests/test_stateful_policy.py -v --timeout=30
      
      

